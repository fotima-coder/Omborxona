{% extends 'base.html' %}

{% block content %}

<div class="content-wrapper">

    <div class="content-header">
        <div class="container-fluid">
            <h1>Mahsulotni tahrirlash</h1>
        </div>
    </div>

    <div class="col-md-6 mx-auto">
        <div class="card card-dark">
            <div class="card-body">

                <form method="post">
                    {% csrf_token %}

                    <label>Nom:</label>
                    <input type="text" name="name" value="{{ product.name }}" class="form-control" required>
                    <br>

                    <label>Brend:</label>
                    <input type="text" name="brand" value="{{ product.brand }}" class="form-control">
                    <br>

                    <label>Narx (so‘m):</label>
                    <input type="number" step="0.01" name="price" value="{{ product.price }}" class="form-control"
                           required>
                    <br>

                    <label>Miqdor ({{ product.unit }}):</label>
                    <input type="number" step="0.01" name="amount" value="{{ product.amount }}" class="form-control"
                           required>
                    <br>

                    <button type="submit" class="btn btn-success">
                        Yangilash
                    </button>

                    <a href="{% url 'products' %}" class="btn btn-danger">
                        Bekor qilish
                    </a>

                </form>

            </div>
        </div>
    </div>

</div>

{% endblock %}
